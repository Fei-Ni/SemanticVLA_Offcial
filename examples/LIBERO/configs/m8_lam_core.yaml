data:
  data_root: ${DATA_ROOT}/libero_lerobot
  trace_root: ${TRACE_ANNOTATIONS_ROOT}/libero_lerobot_aligned
  suites: [spatial, object, goal, "10"]
  window_size: 12
  action_horizon: 8
  image_resolution: 224
  video_key: observation.images.image
  video_backend: torchvision_av
  eval_stride: 10
  eval_split: all
  max_samples_per_suite:
  eval_max_samples_per_suite: 2000
  batch_size: 16
  num_workers: 4

model:
  dino_repo_root: ${REPO_ROOT}/third_party/dinov2
  dino_weights: ${DINOV2_WEIGHTS}/dinov2_vits14_pretrain.pth
  dino_variant: vits14
  model_dim: 384
  enc_layers: 4
  dec_layers: 4
  num_heads: 6
  latent_dim: 128
  trace_hidden_dim: 256
  trace_layers: 2
  trace_tokens: 4
  max_trace_len: 12
  vq_beta: 0.25
  dropout: 0.0
  mock_dino: false

trainer:
  output_root: ${WORK_ROOT}/lam_train
  seed: 42
  max_steps: 400
  learning_rate: 1.0e-4
  weight_decay: 1.0e-2
  grad_clip: 1.0
  precision: bf16
  log_every: 20
  eval_every: 200
  eval_batches: 32
  save_every: 200

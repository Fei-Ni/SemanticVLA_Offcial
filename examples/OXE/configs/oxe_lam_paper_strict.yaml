data:
  trace_index_root: ${WORK_ROOT}/trace_npy_index
  datasets: [bridge, fractal, bcz]
  window_size: 12
  action_horizon: 8
  image_resolution: 224
  eval_stride: 20
  eval_split: all
  sample_stride: 1
  max_samples_per_dataset: null
  eval_max_samples_per_dataset: 8192
  max_episodes_per_dataset: null
  batch_size: 8
  num_workers: 4

model:
  dino_repo_root: ${REPO_ROOT}/third_party/dinov2
  dino_weights: ${DINOV2_WEIGHTS}/dinov2_vitb14_pretrain.pth
  dino_variant: vitb14
  model_dim: 768
  enc_layers: 4
  dec_layers: 6
  num_heads: 8
  decoder_ff_dim: 640
  latent_dim: 768
  trace_hidden_dim: 256
  trace_layers: 12
  trace_num_heads: 8
  trace_tokens: 4
  trace_num_latents: 32
  trace_decoder_hidden_dim: 256
  trace_decoder_layers: 5
  trace_decoder_heads: 8
  fusion_layers: 4
  fusion_heads: 8
  fusion_ff_dim: 512
  max_trace_len: 12
  stage1_warmup_steps: 10000
  freeze_trace_stage_after_warmup: true
  stage1_loss_weight: 1.0
  trace_recon_loss_weight: 1.0
  visual_recon_loss_weight: 1.0
  action_trace_recon_loss_weight: 0.0
  vq_beta: 0.25
  dropout: 0.0
  mock_dino: false

trainer:
  output_root: ${WORK_ROOT}/oxe_lam_train
  seed: 42
  max_steps: 50000
  learning_rate: 1.0e-4
  min_learning_rate: 0.0
  lr_scheduler: cosine
  weight_decay: 1.0e-2
  grad_clip: 1.0
  grad_accum_steps: 64
  precision: bf16
  log_every: 10
  eval_every: 2000
  eval_batches: 256
  save_every: 2000

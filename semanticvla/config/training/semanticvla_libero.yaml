# SemanticVLA training config — trace-guided Qwen-VL + Flow-Matching VLA.
#
# Trace
# conditioning is enabled via two layers of config:
#   - datasets.vla_data.trace.*       — dataloader (trace JSON discovery,
#                                       window size, normalization)
#   - framework.action_model.trace.*  — model (injection point, encoder size)
#
# Keep window_size in both blocks identical.

run_id: semanticvla
run_root_dir: results/vla_train
seed: 42
trackers: [jsonl, wandb]
wandb_entity: nifei
wandb_project: semanticvla
is_debug: false

framework:
  name: SemanticVLA
  qwenvl:
    base_vlm: models/Qwen3-VL-4B-Instruct
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048          # overridden by actual model hidden_size at runtime
  dino:
    dino_backbone: dinov2_vits14
  action_model:
    action_model_type: DiT-B
    action_hidden_dim: 1024
    hidden_size: 1024
    add_pos_embed: true
    max_seq_len: 1024
    action_dim: 7
    state_dim: 7
    future_action_window_size: 7
    action_horizon: 8
    past_action_window_size: 0
    repeated_diffusion_steps: 8
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    diffusion_model_cfg:
      cross_attention_dim: 2048  # overridden by qwen_vl_interface.model.config.hidden_size at runtime
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: ada_norm
      num_layers: 16
      output_dim: 1024
      positional_embeddings: null
      # trace_dim is auto-set at runtime by SemanticVLA.__init__ when
      # injection_mode ∈ {adaln, both}; explicit 0 here for safety.
      trace_dim: 0
    # ----- SemanticVLA-specific: trace conditioning (v0) + LM-text prediction () -----
    trace:
      # injection_mode: where TraceEncoder output enters the action decoder.
      #   none     — mode A (LM aux only, no decoder injection)
      #   sa_embs  — mode B path β: trace tokens prepended into DiT input
      #   adaln    — mode B path γ: pooled trace into DiT temb
      #   both     — mode B path β+γ
      injection_mode: sa_embs
      hidden_dim: 256
      num_layers: 3
      num_heads: 8
      window_size: 12            # MUST match datasets.vla_data.trace.window_size
      num_tokens: 4
      dropout: 0.1

      # ----  additions: anchor sub-sampling + LM-head trace prediction ----
      # num_anchor_points: sub-sample the W=12 dataloader window down to N points.
      #   4 → indices (0, 4, 8, 11)   [first, 1/3, 2/3, last]
      #   6 → indices (0, 2, 5, 7, 9, 11)
      # Set to 0 to keep the full 12-frame window (v0 legacy).
      num_anchor_points: 4

      # lm_aux_loss: enable VLM LM-head trace-text aux supervision.
      #   False → v0 mode (GT trace directly injected, no LM head)
      #   True  → mode A (if injection_mode=none) or mode B (if injection_mode in {sa_embs, adaln, both})
      lm_aux_loss: true
      aux_loss_weight: 0.1
      coord_range: 1000          # Qwen3-VL relative-coords convention (do NOT change)

      # prompt_style: which text template the VLM is trained to output.
      #   plain         — "[[544, 372], [615, 420], ...]" (compact, ~20-25 token)
      #   qwen_point_2d — Qwen3-VL native grounding format with point_2d + label (~80-100 token)
      #   cot_bbox      — parallel to semanticvla CoT_prompt; same target as plain
      prompt_style: plain
  reduce_in_full_precision: true

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: datasets/LEROBOT_LIBERO_DATA
    data_mix: libero_all
    action_type: delta_qpos
    CoT_prompt: "Your task is {instruction}. To identify the key objects for your task. Locate their bounding boxes in [x1,y1,x2,y2] format."
    CoT_answer: bbox
    default_image_resolution: [3, 224, 224]
    per_device_batch_size: 16
    load_all_data_for_training: true
    obs: ["image_0"]
    # SemanticVLA: enable trace augmentation on top of LeRobotMixtureDataset
    trace:
      enabled: true
      root: ${TRACE_ANNOTATIONS_ROOT}/libero_lerobot_aligned
      window_size: 12            # MUST match framework.action_model.trace.window_size
      normalize: true            # divide pixel coords by 256 -> [0, 1]
      # dataloader sub-samples the window to anchor points before delivering.
      # MUST match framework.action_model.trace.num_anchor_points. Default
      # anchor_indices derived from num_anchor_points in trace_text_codec; can be
      # overridden by explicit anchor_indices list here (e.g. [0, 4, 8, 11]).
      num_anchor_points: 4

trainer:
  epochs: 100
  max_train_steps: 30000
  num_warmup_steps: 5000
  save_interval: 10000
  eval_interval: 1000
  learning_rate:
    base: 4.0e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: ''
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 100
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1   # matches upstream cotrain_libero.yaml
  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
